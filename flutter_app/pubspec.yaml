name: tamtom
description: تطبيق Tamtom الرسمي لعرض الموقع الإلكتروني
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # حزمة WebView الأساسية
  webview_flutter: ^4.8.0

  # حزمة تهيئة WebView لمنصة Android
  webview_flutter_android: ^4.0.0

  # حزمة تهيئة WebView لمنصة iOS
  webview_flutter_wkwebview: ^3.13.0

  # فحص الاتصال بالإنترنت
  connectivity_plus: ^6.0.0

  # فتح الروابط الخارجية
  url_launcher: ^6.3.0

  # طلبات HTTP لجلب الإعدادات من السيرفر
  http: ^1.2.0

  # تخزين الإعدادات محلياً
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
